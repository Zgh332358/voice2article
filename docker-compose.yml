# 开发环境依赖（Postgres + Redis）
# W1 Day 3-4 起使用；当前 Day 1-2 可不启动
#
# 启动：docker compose up -d
# 关闭：docker compose down
# 数据持久化在命名 volume：voice_pg_data / voice_redis_data

services:
  postgres:
    image: postgres:16-alpine
    container_name: voice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice_dev
      POSTGRES_DB: voice
    ports:
      - "5432:5432"
    volumes:
      - voice_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice -d voice"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voice-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - voice_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  voice_pg_data:
  voice_redis_data:
