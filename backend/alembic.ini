[alembic]
# 迁移脚本目录
script_location = alembic

# sqlalchemy.url 在 env.py 中从 app.config 注入，这里留空
sqlalchemy.url =

# 文件名模板：使用日期前缀避免冲突
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# 时区
timezone = UTC

# 长度截断
truncate_slug_length = 40

[post_write_hooks]
# 生成新 migration 后手动跑 `uv run ruff format alembic/versions/<file>` 即可
# uv 环境下 console_scripts hook 解析有坑，暂留空

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
